<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColourPlay Studio</title>
    <style>
        :root { 
            /* Relaxing Adult Pastel Palette */
            --primary: #a29bfe; /* Soft Lavender */
            --bg: #f7f9fb;      /* Airy Off-White */
            --accent: #81ecec;  /* Robin's Egg Blue */
            --sidebar-bg: #ffffff;
            --text-muted: #636e72;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .top-header { 
            width: 100%; 
            background: white; 
            padding: 12px 25px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            z-index: 10;
            box-sizing: border-box;
        }
        .header-logo { font-weight: 300; color: var(--primary); font-size: 1.4rem; letter-spacing: 1.5px; text-transform: uppercase; }

        /* MAIN LAYOUT */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBARS */
        .sidebar {
            width: 150px;
            background: var(--sidebar-bg);
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            gap: 15px;
            overflow-y: auto;
        }

        .right-sidebar {
            width: 130px;
            background: var(--sidebar-bg);
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 15px;
            align-items: center;
            overflow-y: auto;
        }

        /* TOOLS & PALETTE */
        #palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tool-box { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .swatch { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .swatch.active { border-color: #d1d8e0; transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* CANVAS AREA */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            background: #f0f2f5;
            overflow: auto;
        }
        .canvas-container { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.06); 
            position: relative;
        }
        canvas { cursor: crosshair; display: block; max-width: 100%; height: auto; border-radius: 12px; }

        /* BUTTONS */
        button { 
            padding: 12px; 
            border-radius: 25px; /* Softer pill shape */
            border: none; 
            background: #f1f2f6; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 13px;
            color: var(--text-muted);
            transition: all 0.2s ease; 
        }
        button:hover { background: #e1e2e6; transform: translateY(-1px); }
        .tool-active { background: var(--primary) !important; color: white; box-shadow: 0 4px 12px rgba(162, 155, 254, 0.3); }
        
        .btn-save { background: var(--accent); color: #2d3436; margin-left: 10px; }
        .btn-save:hover { background: #74e5e5; }

        /* TEMPLATE GALLERY */
        .gallery-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .gallery-item { 
            width: 90px; 
            height: 90px; 
            border-radius: 12px; 
            cursor: pointer; 
            border: 2px solid #f1f2f6; 
            transition: 0.3s ease; 
            object-fit: cover;
            background: white;
        }
        .gallery-item:hover { transform: scale(1.05); border-color: var(--primary); }

        .slider-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; }
        input[type="range"] { accent-color: var(--primary); }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="header-logo">The Love Our Laughter ColourPlay Studio</div>
        <div style="display: flex; align-items: center;">
            <button onclick="resetCanvas()">🗑️ Reset</button>
            <input type="file" id="upload" accept="image/*" style="display:none">
            <button style="margin-left:10px;" onclick="document.getElementById('upload').click()">📤 Upload</button>
            <button class="btn-save" onclick="downloadImage()">📥 Save Art</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="slider-label">BRUSH SIZE</div>
            <input type="range" id="brushSize" min="1" max="50" value="8">
            <hr style="width:100%; border:0; border-top:1px solid #f1f1f1;">
            
            <div class="slider-label">TOOLS</div>
            <div class="tool-box">
                <button id="btn-brush" class="tool-active" onclick="setTool('brush')">🖌️ Brush</button>
                <button id="btn-fill" onclick="setTool('fill')">🧺 Fill</button>
                <button id="btn-erase" onclick="setTool('erase')">🧽 Erase</button>
                <button id="btn-undo" onclick="handleUndo()">↩️ Undo</button>
            </div>
            
            <hr style="width:100%; border:0; border-top:1px solid #f1f1f1;">
            
            <div class="slider-label">PALETTE</div>
            <div id="palette"></div>
            <input type="color" id="customColor" value="#a29bfe" style="width:100%; height:40px; cursor:pointer; margin-top:10px; border-radius:8px; border:1px solid #eee; background:none;">
        </div>

        <div class="canvas-area">
            <div class="canvas-container">
                <canvas id="paintCanvas" width="800" height="800"></canvas>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="gallery-title">Templates</div>
            <img class="gallery-item" src="images/LoveYourself.png" onclick="loadTemplate(this.src)" alt="Love Yourself">
            <img class="gallery-item" src="images/OldWays.png" onclick="loadTemplate(this.src)" alt="Old Ways">
            <img class="gallery-item" src="images/Believe.png" onclick="loadTemplate(this.src)" alt="Believe">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const brushSlider = document.getElementById('brushSize');
        let currentColor = '#a29bfe';
        let currentTool = 'brush';
        let history = [];
        let isDrawing = false;

        const colors = ['#ff7675', '#fdcb6e', '#55efc4', '#81ecec', '#74b9ff', '#a29bfe', '#e17055', '#fab1a0', '#00b894', '#00cec9', '#0984e3', '#6c5ce7', '#d63031', '#e84393', '#2d3436', '#636e72', '#b2bec3', '#ffffff'];
        const palette = document.getElementById('palette');
        
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'swatch' + (c === currentColor ? ' active' : '');
            div.style.backgroundColor = c;
            div.onclick = () => selectColor(c, div);
            palette.appendChild(div);
        });

        function selectColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            if(element) element.classList.add('active');
            document.getElementById('customColor').value = color;
        }

        document.getElementById('customColor').oninput = (e) => selectColor(e.target.value);

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-box button').forEach(b => b.classList.remove('tool-active'));
            const toolBtn = document.getElementById(`btn-${tool}`);
            if (toolBtn) toolBtn.classList.add('tool-active');
        }

        function handleUndo() {
            // briefly show active state for visual feedback
            const originalTool = currentTool;
            setTool('undo');
            undo();
            // Optional: Switch back to previous tool after a short delay
            setTimeout(() => setTool(originalTool), 150);
        }

        // --- Core Drawing Logic ---
        function loadTemplate(src) {
            saveState();
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = src;
        }

        canvas.onmousedown = (e) => {
            saveState();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            if (currentTool === 'fill') {
                floodFill(Math.floor(x), Math.floor(y), currentColor);
            } else if (currentTool !== 'undo') {
                isDrawing = true;
                draw(e);
            }
        };

        window.onmouseup = () => { isDrawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => { if (isDrawing) draw(e); };

        function draw(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            ctx.lineWidth = brushSlider.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (currentTool === 'erase') {
                ctx.globalCompositeOperation = 'destination-out';
            } else {
                ctx.globalCompositeOperation = 'multiply';
                ctx.strokeStyle = currentColor;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function floodFill(startX, startY, fillHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const startPos = (startY * canvas.width + startX) * 4;
            const r = imageData.data[startPos], g = imageData.data[startPos+1], b = imageData.data[startPos+2], a = imageData.data[startPos+3];
            const fillRGB = hexToRgb(fillHex);
            if (r === fillRGB.r && g === fillRGB.g && b === fillRGB.b && a === 255) return;

            const stack = [[startX, startY]];
            while(stack.length) {
                const [x, y] = stack.pop();
                const pos = (y * canvas.width + x) * 4;
                if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height && 
                    imageData.data[pos] === r && imageData.data[pos+1] === g && 
                    imageData.data[pos+2] === b && imageData.data[pos+3] === a) {
                    imageData.data[pos] = fillRGB.r;
                    imageData.data[pos+1] = fillRGB.g;
                    imageData.data[pos+2] = fillRGB.b;
                    imageData.data[pos+3] = 255;
                    stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) };
        }

        function saveState() { 
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height)); 
            if (history.length > 25) history.shift(); 
        }

        function undo() { if (history.length > 0) ctx.putImageData(history.pop(), 0, 0); }
        function resetCanvas() { saveState(); ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function downloadImage() { 
            const link = document.createElement('a');
            link.download = 'my-art.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        document.getElementById('upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    saveState();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
