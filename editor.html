<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColourPlay Studio</title>
    <style>
        :root { 
            --primary: #ff8a80; 
            --accent: #fff59d;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #dcdde1;
            --text-main: #2f3640;
            --text-muted: #7f8c8d;
            --warning: #f0932b;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: var(--text-main);
        }
        
        .top-header { 
            background: var(--surface); 
            border-bottom: 1px solid var(--border);
            padding: 12px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-sizing: border-box;
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 180px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .right-sidebar {
            width: 140px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 20px 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        
        .swatch { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 6px; 
            cursor: pointer; 
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        .swatch.active { outline: 2px solid var(--text-main); transform: scale(1.1); }
        
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: auto;
        }

        .canvas-container { 
            background: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            line-height: 0; 
        }

        canvas { cursor: crosshair; background: white; }

        button { 
            padding: 8px 12px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            background: #fff; 
            cursor: pointer; 
            font-size: 13px;
        }

        .tool-active { background: var(--primary) !important; color: white !important; }
        .gallery-item { width: 100px; height: 100px; object-fit: cover; border: 2px solid #eee; cursor: pointer; border-radius: 8px; }
        .gallery-item:hover { border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="top-header">
        <div style="font-weight: bold; color: var(--primary);">🎨 ColourPlay Studio</div>
        <div style="display: flex; gap: 8px;">
            <button onclick="resetCanvas()" style="background: var(--warning); color: white;">Reset</button>
            <button onclick="downloadImage()" style="background: var(--accent);">Save Art</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <label style="font-size: 11px; font-weight: bold;">BRUSH SIZE</label>
            <input type="range" id="brushSize" min="1" max="50" value="10">
            
            <div id="palette"></div>
            <input type="color" id="customColor" style="width: 100%; height: 40px; margin-top: 5px;">
            
            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                <button id="btn-brush" class="tool-active" onclick="setTool('brush')">🖌️ Brush</button>
                <button id="btn-fill" onclick="setTool('fill')">🧺 Fill</button>
                <button id="btn-erase" onclick="setTool('erase')">🧽 Erase</button>
                <button onclick="undo()">↩️ Undo</button>
            </div>
        </div>

        <div class="canvas-area">
            <div class="canvas-container">
                <canvas id="paintCanvas" width="800" height="800"></canvas>
            </div>
        </div>

        <div class="right-sidebar">
            <div style="font-size: 11px; font-weight: bold; margin-bottom: 5px;">TEMPLATES</div>
            <img class="gallery-item" src="images/LoveYourself.png" onclick="loadTemplate(this.src)">
            <img class="gallery-item" src="images/OldWays.png" onclick="loadTemplate(this.src)">
            <img class="gallery-item" src="images/Believe.png" onclick="loadTemplate(this.src)">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const brushSlider = document.getElementById('brushSize');
        
        let currentColor = '#6c5ce7';
        let currentTool = 'brush';
        let history = [];
        let isDrawing = false;

        // Initialize Canvas
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const colors = ['#e84393', '#d63031', '#e17055', '#fdcb6e', '#26de81', '#0984e3', '#6c5ce7', '#2d3436', '#f1f1f1'];
        const palette = document.getElementById('palette');

        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'swatch' + (c === currentColor ? ' active' : '');
            div.style.backgroundColor = c;
            div.onclick = () => {
                currentColor = c;
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                div.classList.add('active');
            };
            palette.appendChild(div);
        });

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('button').forEach(b => b.classList.remove('tool-active'));
            if(document.getElementById('btn-' + tool)) document.getElementById('btn-' + tool).classList.add('tool-active');
        }

        function saveState() {
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if (history.length > 20) history.shift();
        }

        function undo() {
            if (history.length > 0) ctx.putImageData(history.pop(), 0, 0);
        }

        function resetCanvas() {
            if(confirm("Clear canvas?")) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function loadTemplate(src) {
            const img = new Image();
            img.onload = () => {
                saveState();
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = src;
        }

        canvas.onmousedown = (e) => {
            saveState();
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
            
            if (currentTool === 'fill') floodFill(x, y, currentColor);
            else { isDrawing = true; draw(e); }
        };

        window.onmouseup = () => { isDrawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => { if (isDrawing) draw(e); };

        function draw(e) {
            if(!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            ctx.lineWidth = brushSlider.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = (currentTool === 'erase') ? 'white' : currentColor;
            ctx.globalCompositeOperation = (currentTool === 'erase') ? 'source-over' : 'multiply';

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function floodFill(startX, startY, fillHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const fillRGB = hexToRgb(fillHex);
            const startPos = (startY * canvas.width + startX) * 4;
            const startR = imageData.data[startPos], startG = imageData.data[startPos+1], startB = imageData.data[startPos+2];
            
            if (Math.abs(startR - fillRGB.r) < 5 && Math.abs(startG - fillRGB.g) < 5) return;

            const stack = [[startX, startY]];
            while(stack.length) {
                const [x, y] = stack.pop();
                const pos = (y * canvas.width + x) * 4;
                if(x>=0 && x<canvas.width && y>=0 && y<canvas.height && imageData.data[pos] === startR) {
                    imageData.data[pos] = fillRGB.r;
                    imageData.data[pos+1] = fillRGB.g;
                    imageData.data[pos+2] = fillRGB.b;
                    imageData.data[pos+3] = 255;
                    stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return {r, g, b};
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'art.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
