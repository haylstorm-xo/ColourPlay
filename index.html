<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColourPlay Studio</title>
    <style>
        :root { 
            /* Branding & Core Accents */
            --primary: #ff8a80;   /* Soft Coral Pink */
            --accent: #fff59d;    /* Muted Pastel Yellow */
            --bg: #f0f2f5;        /* Neutral Studio Grey */
                   
            /* UI Surfaces */
            --surface: #ffffff;   /* Pure White */
            --border: #dcdde1;    /* Defined light grey */
        
            /* Typography - The "Ink" Palette */
            --text-main: #2f3640;   /* Deep Charcoal (Easier on eyes than black) */
            --text-muted: #7f8c8d;  /* Medium Grey for labels */
            --text-light: #bdc3c7;  /* Softest grey for disabled states */
        
            /* Functional UI States */
            --success: #00b894;     /* Mint Green */
            --danger: #eb4d4b;      /* Soft Red */
            --warning: #f0932b;     /* Warm Orange */
        }
                
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: var(--text-main);
        }
        
        /* HEADER */
        .top-header { 
            width: 100%; 
            background: var(--surface); 
            border-bottom: 1px solid var(--border);
            padding: 12px 25px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            z-index: 10;
            box-sizing: border-box;
        }
        .header-logo { font-weight: 600; color: var(--primary); font-size: 1.4rem; letter-spacing: 0.5px; }

        /* MAIN LAYOUT */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBARS */
        .sidebar {
            width: 160px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            gap: 15px;
            overflow-y: auto;
        }

        .right-sidebar {
            width: 130px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 15px;
            align-items: center;
            overflow-y: auto;
        }

        /* TOOLS & PALETTE */
        #palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tool-box { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .swatch { 
            width: 40px; 
            height: 40px; 
            border-radius: 10px; 
            cursor: pointer; 
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }
        .swatch.active { border-color: var(--text-muted); transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* CANVAS AREA */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            background: #f0f2f5;
            overflow: auto;
        }
        .canvas-container { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.06); 
            position: relative;
            line-height: 0; /* Prevents tiny gap at bottom */
        }
        canvas { cursor: crosshair; display: block; border-radius: 12px; background-color: white; }

        /* BUTTONS */
        button { 
            padding: 10px 15px; 
            border-radius: 20px;
            border: none; 
            background: #f1f2f6; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 13px;
            color: var(--text-muted);
            transition: all 0.2s ease; 
        }
        button:hover { background: #e1e2e6; transform: translateY(-1px); }
        .tool-active { background: var(--primary) !important; color: white !important; }
        
        .btn-save { background: var(--accent); color: var(--text-main); font-weight: bold; }
        .btn-save:hover { filter: brightness(0.9); }

        /* TEMPLATES */
        .gallery-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .gallery-item { 
            width: 90px; 
            height: 90px; 
            border-radius: 12px; 
            cursor: pointer; 
            border: 2px solid #f1f2f6; 
            transition: 0.3s ease; 
            object-fit: cover;
            background: white;
        }
        .gallery-item:hover { transform: scale(1.05); border-color: var(--primary); }

        .slider-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: -5px; }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="header-logo">🎨 The Love Our Laughter ColourPlay Studio</div>
        <div style="display: flex; gap: 10px;">
            <button onclick="resetCanvas()" style="background: #ffeaa7;">🗑️ Reset</button>
            <input type="file" id="upload" accept="image/*" style="display:none">
            <button onclick="document.getElementById('upload').click()">📤 Upload</button>
            <button class="btn-save" onclick="downloadImage()">📥 Save Art</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="slider-label">BRUSH SIZE</div>
            <input type="range" id="brushSize" min="1" max="50" value="8">
            
            <hr style="width:100%; border:0; border-top:1px solid #f1f1f1; margin: 10px 0;">
            
            <div class="slider-label">TOOLS</div>
            <div class="tool-box">
                <button id="btn-brush" class="tool-active" onclick="setTool('brush')">🖌️ Brush</button>
                <button id="btn-fill" onclick="setTool('fill')">🧺 Fill</button>
                <button id="btn-erase" onclick="setTool('erase')">🧽 Erase</button>
                <button id="btn-undo" onclick="undo()">↩️ Undo</button>
            </div>
            
            <hr style="width:100%; border:0; border-top:1px solid #f1f1f1; margin: 10px 0;">
            
            <div class="slider-label">PALETTE</div>
            <div id="palette"></div>
            <input type="color" id="customColor" value="#a29bfe" style="width:100%; height:40px; cursor:pointer; margin-top:10px; border-radius:8px; border:1px solid #eee;">
        </div>

        <div class="canvas-area">
            <div class="canvas-container">
                <canvas id="paintCanvas" width="800" height="800"></canvas>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="gallery-title">Templates</div>
            <img class="gallery-item" src="images/LoveYourself.png" onclick="loadTemplate(this.src)" alt="Love Yourself">
            <img class="gallery-item" src="images/OldWays.png" onclick="loadTemplate(this.src)" alt="Old Ways">
            <img class="gallery-item" src="images/Believe.png" onclick="loadTemplate(this.src)" alt="Believe">
            <img class="gallery-item" src="images/Grow.PNG" onclick="loadTemplate(this.src)" alt="Grow">
            <img class="gallery-item" src="images/LOL.PNG" onclick="loadTemplate(this.src)" alt="Love Our Laughter">
            <img class="gallery-item" src="images/Celestial.PNG" onclick="loadTemplate(this.src)" alt="Celestial">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const brushSlider = document.getElementById('brushSize');
        
        let currentColor = '#a29bfe';
        let currentTool = 'brush';
        let history = [];
        let isDrawing = false;

        // Initialize White Canvas
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const colors = [
            /* Rainbow */
            '#e84393', '#d63031', '#e17055', '#fdcb6e', '#f9ca24', '#26de81', 
            '#05c46b', '#00cec9', '#0984e3', '#3867d6', '#6c5ce7', '#2d3436',
            /* Pastels */
            '#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#a0c4ff', 
            '#bdb2ff', '#ffc6ff', '#f1f1f1', '#b2bec3', '#a29bfe', '#636e72'];
        const palette = document.getElementById('palette');
        
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'swatch' + (c === currentColor ? ' active' : '');
            div.style.backgroundColor = c;
            div.onclick = () => selectColor(c, div);
            palette.appendChild(div);
        });

        function selectColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            if(element) element.classList.add('active');
            document.getElementById('customColor').value = color;
        }

        document.getElementById('customColor').oninput = (e) => selectColor(e.target.value);

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-box button').forEach(b => b.classList.remove('tool-active'));
            const toolBtn = document.getElementById(`btn-${tool}`);
            if (toolBtn) toolBtn.classList.add('tool-active');
        }

        function saveState() { 
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height)); 
            if (history.length > 30) history.shift(); 
        }

        function undo() { 
            if (history.length > 0) {
                ctx.putImageData(history.pop(), 0, 0);
            }
        }

        function resetCanvas() { 
            saveState(); 
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }

        function loadTemplate(src) {
            saveState();
            const img = new Image();
            img.crossOrigin = "anonymous"; 
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = src;
        }

        // --- Interaction Logic ---
        canvas.onmousedown = (e) => {
            saveState();
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
            
            if (currentTool === 'fill') {
                floodFill(x, y, currentColor);
            } else {
                isDrawing = true;
                draw(e);
            }
        };

        window.onmouseup = () => { isDrawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => { if (isDrawing) draw(e); };

        function draw(e) {
            if(!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            ctx.lineWidth = brushSlider.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
    
            if (currentTool === 'erase') {
                ctx.globalCompositeOperation = 'destination-out';
            } else {
                // 'multiply' is perfect for coloring lines!
                ctx.globalCompositeOperation = 'multiply';
                ctx.strokeStyle = currentColor;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function floodFill(startX, startY, fillHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const fillRGB = hexToRgb(fillHex);
            const startPos = (startY * canvas.width + startX) * 4;
            
            const startR = imageData.data[startPos];
            const startG = imageData.data[startPos + 1];
            const startB = imageData.data[startPos + 2];
            const startA = imageData.data[startPos + 3];

            // Tolerance level (0-255). 30-60 is usually the sweet spot for coloring pages.
            const tolerance = 60; 

            // Avoid infinite loop if clicking same color
            if (matchColor(startR, startG, startB, startA, fillRGB.r, fillRGB.g, fillRGB.b, 255, 5)) return;

            const stack = [[startX, startY]];
            const tolerance = 50;

            while (stack.length) {
                const [x, y] = stack.pop();
                const pos = (y * canvas.width + x) * 4;

                if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height && 
                    matchColor(imageData.data[pos], imageData.data[pos+1], imageData.data[pos+2], imageData.data[pos+3], startR, startG, startB, startA, tolerance)) {
                    
                    imageData.data[pos] = fillRGB.r;
                    imageData.data[pos+1] = fillRGB.g;
                    imageData.data[pos+2] = fillRGB.b;
                    imageData.data[pos+3] = 255;

                    stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function matchColor(r1, g1, b1, a1, r2, g2, b2, a2, t) {
            return Math.abs(r1 - r2) <= t && Math.abs(g1 - g2) <= t && Math.abs(b1 - b2) <= t && Math.abs(a1 - a2) <= t;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function downloadImage() { 
            const link = document.createElement('a');
            link.download = 'my-masterpiece.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        document.getElementById('upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    saveState();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
